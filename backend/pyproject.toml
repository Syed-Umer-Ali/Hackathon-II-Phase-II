[tool.black]
line-length = 88
target-version = ['py310'] # Targeting Python 3.10+

[tool.ruff]
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
    "UP", # pyupgrade
    "A",  # flake8-builtins
    "ERA", # eradicate
    "N",  # pep8-naming
    "D",  # pydocstyle (optional, can be very opinionated)
]
ignore = [
    "D100", "D104", "D105", "D107", # Ignore missing docstrings in modules, packages, and __init__
]

[tool.ruff.mccabe]
max-complexity = 10

[tool.ruff.isort]
known-first-party = ["src"]
known-third-party = ["fastapi", "sqlmodel", "uvicorn", "pydantic", "loguru"]

[tool.ruff.pydocstyle]
convention = "google" # Use Google style docstrings


